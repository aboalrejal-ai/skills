name: Unified Agent Skills CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Verify directory structure
        run: |
          test -d skills/
          test -f README.md
          test -f package.json

      - name: Run skill verification audits
        run: npm run validate

      - name: Run index compile test
        run: npm run index

      - name: Validate editorial bundles sync
        run: npm run bundles:sync
